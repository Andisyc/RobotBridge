obs:
  obs_dict: {}
  obs_scales: {}
  obs_auxiliary: {}
  obs_dims: []
sim:
  _target_: simulator.mujoco.Mujoco
  _recursive_: false
  config:
    marker: true
    random_init_heading: false
    control: ${robot.control}
    asset: ${robot.asset}
env:
  _target_: envs.mosaic.MosaicEnv
  _recursive_: false
  config:
    device: ${device}
    simulator: ${sim}
    obs: ${obs}
    control: ${robot.control}
    collect_dataset: false
    motion: ${mimic.motion}
    policy: ${mimic.policy}
agent:
  _target_: agents.mosaic_agent.MosaicAgent
  _recursive_: true
  env: ${env}
  config:
    checkpoint: ${mimic.policy.checkpoint}
    device: ${device}
mimic:
  policy:
    checkpoint: ./data/model/gmt.onnx
    without_state_estimator: true
    action_beta: 1.0
    max_timestep: -1
    use_estimator: false
    eval_mode: false
    history_length: 5
    save_video: false
  motion:
    motion_path: ./data/motion/dance1_subject1.npz
    playback_speed: 1.0
    loop: false
    override_robot_anchor_pos: false
    interp_steps: 5
    anchor_body_name: torso_link
    command_horizon: 1
    command_velocity: true
    body_names:
    - pelvis
    - left_hip_roll_link
    - left_knee_link
    - left_ankle_roll_link
    - right_hip_roll_link
    - right_knee_link
